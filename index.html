<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Punching Bag</title>

<style>
  body {
    margin: 0;
    height: 100vh;
    background: radial-gradient(circle at center, #111827, #000);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    font-family: sans-serif;
    color: white;
    overflow: hidden;
  }

  h1 {
    margin-bottom: 10px;
    font-size: 24px;
    opacity: 0.8;
  }

  #counter {
    margin-bottom: 20px;
    font-size: 18px;
    color: #93c5fd;
  }

  #bag {
    width: 220px;
    height: 320px;
    object-fit: cover;
    border-radius: 20px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.6);
    cursor: pointer;
    transition: transform 0.1s;
  }

  .punch {
    animation: punch 0.2s ease;
  }

  @keyframes punch {
    0% { transform: scale(1) rotate(0deg); }
    25% { transform: scale(0.95) rotate(-2deg); }
    50% { transform: scale(1.05) rotate(2deg); }
    100% { transform: scale(1) rotate(0deg); }
  }

  input {
    margin-top: 20px;
    color: white;
  }

  .hint {
    margin-top: 10px;
    font-size: 12px;
    opacity: 0.5;
  }
</style>
</head>

<body>

<h1>🥊 Punching Bag</h1>
<div id="counter">Удары: 0</div>

<img id="bag" src="https://images.unsplash.com/photo-1599058917212-d750089bc07e" />

<input type="file" id="upload" accept="image/*">
<div class="hint">Загрузи фото → кликай по груше ЛКМ</div>

<script>
let hits = 0;

const bag = document.getElementById("bag");
const counter = document.getElementById("counter");

// 👊 удар по клику
bag.addEventListener("click", () => {
  hits++;
  counter.textContent = "Удары: " + hits;

  bag.classList.add("punch");
  setTimeout(() => bag.classList.remove("punch"), 200);

  // лёгкий “вибро-эффект”
  window.navigator.vibrate?.(50);
});

// 📸 загрузка фото
document.getElementById("upload").addEventListener("change", function(e) {
  const file = e.target.files[0];
  if (file) {
    bag.src = URL.createObjectURL(file);
  }
});
</script>

</body>
</html>

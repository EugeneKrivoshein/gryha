<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Punching Bag</title>

<style>
  body {
    margin: 0;
    height: 100vh;
    background: radial-gradient(circle at center, #1f2937, #000);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    font-family: sans-serif;
    color: white;
    overflow: hidden;
  }

  h1 {
    font-size: 20px;
    opacity: 0.7;
    margin-bottom: 10px;
  }

  #counter {
    margin-bottom: 20px;
    color: #60a5fa;
  }

  /* 🥊 контейнер груши */
  .bag-wrapper {
    position: relative;
    width: 220px;
    height: 360px;
  }

  /* тень на полу */
  .shadow {
    position: absolute;
    bottom: -40px;
    left: 50%;
    transform: translateX(-50%);
    width: 180px;
    height: 40px;
    background: radial-gradient(rgba(0,0,0,0.6), transparent);
    border-radius: 50%;
  }

  /* груша */
  #bag {
    width: 100%;
    height: 100%;
    object-fit: cover;
    border-radius: 40px;
    box-shadow:
      inset -20px -30px 60px rgba(0,0,0,0.6),
      inset 20px 30px 40px rgba(255,255,255,0.05),
      0 30px 80px rgba(0,0,0,0.7);
    cursor: pointer;
    transition: transform 0.12s ease;
    filter: contrast(1.05) saturate(0.9);
  }

  /* удар */
  .hit {
    animation: hit 0.15s ease;
  }

  @keyframes hit {
    0%   { transform: scale(1) rotate(0deg); }
    30%  { transform: scale(0.97) translateX(-4px) rotate(-1deg); }
    60%  { transform: scale(1.02) translateX(4px) rotate(1deg); }
    100% { transform: scale(1); }
  }

  /* цепь сверху (как у реальной груши) */
  .chain {
    position: absolute;
    top: -60px;
    left: 50%;
    width: 6px;
    height: 60px;
    transform: translateX(-50%);
    background: linear-gradient(#555, #999, #444);
    border-radius: 3px;
    box-shadow: 0 5px 10px rgba(0,0,0,0.6);
  }

  input {
    margin-top: 20px;
    color: white;
  }

  .hint {
    font-size: 12px;
    opacity: 0.4;
    margin-top: 10px;
  }
</style>
</head>

<body>

<h1>🥊 Punching Bag</h1>
<div id="counter">Удары: 0</div>

<div class="bag-wrapper">
  <div class="chain"></div>
  <img id="bag"
       src="https://images.unsplash.com/photo-1599058917212-d750089bc07e"
       alt="bag">
  <div class="shadow"></div>
</div>

<input type="file" id="upload" accept="image/*">
<div class="hint">ЛКМ по груше — удар</div>

<script>
let hits = 0;

const bag = document.getElementById("bag");
const counter = document.getElementById("counter");

bag.addEventListener("click", () => {
  hits++;
  counter.textContent = "Удары: " + hits;

  bag.classList.add("hit");
  setTimeout(() => bag.classList.remove("hit"), 150);

  // лёгкая вибрация
  navigator.vibrate?.(40);
});

document.getElementById("upload").addEventListener("change", (e) => {
  const file = e.target.files[0];
  if (file) {
    bag.src = URL.createObjectURL(file);
  }
});
</script>

</body>
</html>
